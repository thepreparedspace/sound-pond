<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>sound pond</title>
<link href="https://fonts.googleapis.com/css2?family=Andika:wght@400;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#E8E4D4;--pond:#4A7C68;--pond-deep:#346050;
  --leaf:#5A8C3C;--leaf-deep:#3C6828;
  --sun:#D49030;--coral:#B85830;--coral-deep:#8C3E1C;
  --ink:#382E18;--card-bg:#F8F4E4;
  --read-font:'Dancing Script',cursive;--ui-font:'Dancing Script',cursive;
  --sand-num-color:#C17A3A;
}
*{box-sizing:border-box;}[hidden]{display:none!important;}
html,body{margin:0;height:100%;}
body{font-family:var(--ui-font);color:var(--ink);min-height:100vh;overflow-x:hidden;
  background:var(--cream);display:flex;flex-direction:column;transition:background .8s;}
.sky{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.sun-w{position:absolute;top:8px;right:12px;width:76px;height:76px;}
.cl{position:absolute;}
.cl1{width:148px;height:56px;top:20px;left:4%;}
.cl2{width:106px;height:46px;top:72px;left:57%;}
.app{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;min-height:100vh;}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;gap:10px;flex-wrap:wrap;}
.brand{font-family:var(--ui-font);font-weight:800;font-size:1.7rem;display:flex;align-items:center;gap:8px;}
.brand svg{width:1.4em;height:1.1em;flex-shrink:0;}
.hdr{display:flex;align-items:center;gap:10px;margin-left:auto;}
.ibtn{background:var(--card-bg);border:none;width:42px;height:42px;border-radius:50%;cursor:pointer;
  box-shadow:0 2px 0 rgba(60,48,18,.15);display:flex;align-items:center;justify-content:center;color:var(--ink);}
.ibtn svg{width:22px;height:22px;}
.ibtn:focus-visible,.btn:focus-visible,select:focus-visible{outline:3px solid var(--coral);outline-offset:2px;}
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 16px 20px;gap:22px;}
.card{position:relative;background:var(--card-bg);width:min(640px,92vw);min-height:160px;
  border-radius:38% 62% 63% 37%/41% 44% 56% 59%;
  box-shadow:0 10px 0 rgba(56,46,24,.08),0 14px 30px rgba(60,96,50,.13);
  display:flex;align-items:center;justify-content:center;padding:38px 8%;
  border:4px solid var(--leaf);transition:transform .25s,border-color .8s;}
.card.win{animation:winPulse 0.8s ease;}
@keyframes winPulse{0%{transform:scale(1)}30%{transform:scale(1.04) rotate(-.5deg)}60%{transform:scale(1.02) rotate(.5deg)}100%{transform:scale(1)}}
.lfic{position:absolute;top:-13px;left:-13px;width:30px;height:30px;transform:rotate(-14deg);}
.sentence{font-family:var(--read-font);font-weight:700;font-size:clamp(1.9rem,5.4vw,3.1rem);text-align:center;line-height:1.6;}
.word{display:inline-block;padding:0 2px;border-radius:6px;cursor:pointer;transition:background .15s;}
.word:hover{background:rgba(212,144,48,.18);}
.ltr{display:inline-block;border-radius:3px;transition:background .1s,color .1s;}
.ltr.ph-on{background:var(--sun);color:var(--ink);}
.word.blend-on{background:var(--sun);color:var(--ink);}
.word.blend-on .ltr{background:transparent;color:inherit;}
.word.sentence-hl{background:rgba(212,144,48,.38);color:var(--ink);}
.controls{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;}
.btn{font-family:var(--ui-font);font-weight:700;font-size:1.4rem;border:none;cursor:pointer;
  padding:14px 26px;border-radius:999px;color:#fff;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 5px 0 rgba(0,0,0,.14);transition:transform .08s,background-color .8s;}
.btn svg{width:1.1em;height:1.1em;flex-shrink:0;}
.btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.14);}
.btn-s{background:var(--coral)}.btn-s:hover{background:var(--coral-deep)}
.btn-d{background:var(--leaf-deep)}.btn-d:hover{opacity:.9}
.btn-n{background:var(--pond-deep);font-size:1rem;padding:14px 20px;}.btn-n:hover{opacity:.9}
.btn-icon{padding:14px 18px;}
.btn-icon svg{width:1.35em;height:1.35em;}
.btn-icon .glyph{font-size:1.5em;line-height:1;font-weight:700;}
.btn:disabled{opacity:.3;cursor:not-allowed;}
.pond-path{padding:28px 0 38px;background:var(--pond);transition:background .8s;border-top:3px solid rgba(255,255,255,.1);overflow:visible;}
.track{position:relative;width:min(600px,90vw);margin:0 auto;padding:0 24px;height:80px;overflow:visible;}
.pads{position:relative;display:flex;justify-content:space-between;align-items:center;height:100%;margin-right:52px;}
.land-bank{position:absolute;right:-8px;top:50%;transform:translateY(-62%);width:58px;height:52px;pointer-events:none;z-index:2;}
.land-bank svg{width:100%;height:100%;display:block;filter:drop-shadow(0 3px 3px rgba(10,20,5,.24));}
.pad{width:46px;height:46px;position:relative;transition:transform .3s,opacity .3s;}
.pad svg{width:100%;height:100%;display:block;filter:drop-shadow(0 3px 3px rgba(10,22,8,.25));transition:filter .3s;}
.pad.done{opacity:.72;transform:scale(.85);}
.pad.active{transform:scale(1.13);}
.pad.active svg{filter:drop-shadow(0 3px 3px rgba(10,22,8,.25)) drop-shadow(0 0 9px rgba(255,255,255,.88)) drop-shadow(0 0 4px rgba(255,255,255,.70));}
.pad.next-active{transform:scale(1.08);}
.pad.next-active svg{filter:drop-shadow(0 3px 3px rgba(10,22,8,.25)) drop-shadow(0 0 12px rgba(255,255,255,.95)) drop-shadow(0 0 5px rgba(255,255,255,.75));animation:padBeckon .5s ease-out;}
@keyframes padBeckon{0%{filter:drop-shadow(0 3px 3px rgba(10,22,8,.25));}55%{filter:drop-shadow(0 3px 3px rgba(10,22,8,.25)) drop-shadow(0 0 18px rgba(255,255,255,1)) drop-shadow(0 0 9px rgba(255,255,255,.95));}100%{filter:drop-shadow(0 3px 3px rgba(10,22,8,.25)) drop-shadow(0 0 12px rgba(255,255,255,.95)) drop-shadow(0 0 5px rgba(255,255,255,.75));}}
.pad.tappable{cursor:pointer;}
.pad.tappable:hover,.pad.tappable:focus-visible{transform:scale(.93);opacity:.9;}
.pad.tappable:hover svg,.pad.tappable:focus-visible svg{filter:drop-shadow(0 3px 3px rgba(10,22,8,.25)) drop-shadow(0 0 6px rgba(255,255,255,.55));}
.frog{position:absolute;top:50%;left:0;width:72px;height:60px;transform:translate(-50%,-68%);
  transition:left .55s cubic-bezier(.34,1.56,.64,1);
  filter:drop-shadow(0 5px 3px rgba(0,0,0,.22));pointer-events:none;z-index:3;overflow:visible;}
.frog svg{width:100%;height:100%;display:block;}
.frog.hopping{animation:hop .55s ease;}
@keyframes hop{0%{transform:translate(-50%,-68%) scale(1,1)}35%{transform:translate(-50%,-158%) scale(.9,1.14)}70%{transform:translate(-50%,-68%) scale(1.06,.9)}100%{transform:translate(-50%,-68%) scale(1,1)}}
.frog.catching{animation:snap .5s ease;}
@keyframes snap{0%{transform:translate(-50%,-68%)}25%{transform:translate(-50%,-92%) scale(1.1,.9) rotate(4deg)}55%{transform:translate(-50%,-68%) scale(1.04,.97)}100%{transform:translate(-50%,-68%)}}
.tongue-line{stroke-dasharray:50;stroke-dashoffset:50;}
.tongue-tip,.tongue-tip-hl{opacity:0;}
.frog.catching .tongue-line{animation:tongueFlick .5s ease;}
.frog.catching .tongue-tip,.frog.catching .tongue-tip-hl{animation:tongueTip .5s ease;}
@keyframes tongueFlick{0%{stroke-dashoffset:50;}30%{stroke-dashoffset:0;}62%{stroke-dashoffset:0;}100%{stroke-dashoffset:50;}}
@keyframes tongueTip{0%{opacity:0;}28%{opacity:0;}38%{opacity:1;}60%{opacity:1;}78%{opacity:0;}100%{opacity:0;}}
.bug{position:absolute;top:50%;left:0;width:32px;height:26px;transform:translate(-50%,-210%);
  transition:left .5s cubic-bezier(.34,1.56,.64,1),transform .4s,opacity .4s;pointer-events:none;z-index:4;}
.bug .bi{width:100%;height:100%;animation:bidle 2.3s ease-in-out infinite;}
.bug svg{width:100%;height:100%;display:block;filter:drop-shadow(0 2px 1px rgba(0,0,0,.2));}
.bug.fluttering .bi{animation:bflut .5s ease;}
@keyframes bidle{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-6px) rotate(3deg)}}
@keyframes bflut{0%{transform:translateY(0)}40%{transform:translateY(-16px) rotate(-8deg)}70%{transform:translateY(-3px) rotate(5deg)}100%{transform:translateY(0)}}
.bug.caught{transform:translate(-50%,-68%) scale(.1);opacity:0;transition:transform .4s,opacity .4s;}
.sand-num{font-family:'Andika',sans-serif;font-weight:700;color:var(--sand-num-color);line-height:1;display:inline-block;position:relative;}
.badge-sand{font-size:1.15rem;letter-spacing:.02em;}
.sand-glyph{display:inline-block;height:1em;width:.85em;vertical-align:-0.1em;}
.sand-glyph svg{width:100%;height:100%;display:block;}
.overlay-sand{font-size:5.6rem;text-shadow:2px 2px 0 rgba(138,74,18,.18),0 4px 0 rgba(138,74,18,.10);}
.pond-next-overlay{position:fixed;inset:0;z-index:70;display:flex;align-items:center;justify-content:center;background:rgba(30,50,20,.42);padding:20px;}
.pond-next-card{background:var(--card-bg);border-radius:32px;padding:40px 40px 34px;max-width:280px;width:100%;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,.2),0 0 0 3px var(--leaf);display:flex;flex-direction:column;align-items:center;gap:16px;animation:cardPop .4s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes cardPop{0%{transform:scale(.72);opacity:0}100%{transform:scale(1);opacity:1}}
.pond-next-label{font-family:var(--ui-font);font-size:1.15rem;color:var(--pond-deep);margin:0;opacity:.75;letter-spacing:.01em;}
.pond-next-btn{background:var(--leaf-deep);font-family:var(--ui-font);font-weight:700;font-size:1.5rem;border:none;cursor:pointer;padding:14px 32px;border-radius:999px;color:#fff;box-shadow:0 5px 0 rgba(0,0,0,.16);display:inline-flex;align-items:center;gap:8px;transition:transform .08s,opacity .2s;}
.pond-next-btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.16);}
.pond-next-btn:hover{opacity:.92;}
.ripple{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:3px solid rgba(255,255,255,.42);border-radius:50%;width:0;height:0;animation:rOut 1s cubic-bezier(.1,.8,.3,1) forwards;pointer-events:none;z-index:10;}
@keyframes rOut{0%{width:0;height:0;opacity:.9}100%{width:600px;height:600px;opacity:0}}
.badge{display:flex;align-items:center;gap:5px;background:var(--card-bg);border-radius:999px;padding:5px 12px;font-size:1rem;font-weight:700;box-shadow:0 2px 0 rgba(60,48,18,.12);color:var(--ink);font-family:var(--ui-font);}
.badge svg{width:15px;height:15px;flex-shrink:0;}
.badge-word{font-size:1rem;}
.ov{position:fixed;inset:0;background:rgba(48,40,20,.44);display:flex;align-items:center;justify-content:center;z-index:60;padding:16px;}
.ovc{background:var(--card-bg);border-radius:28px;max-width:400px;width:100%;max-height:86vh;display:flex;flex-direction:column;text-align:center;box-shadow:0 16px 40px rgba(0,0,0,.15);overflow:hidden;text-transform:lowercase;}
.mhdr{position:relative;padding:22px 50px 6px 26px;flex:0 0 auto;}
.mbdy{padding:0 26px 26px;overflow-y:auto;flex:1 1 auto;}
.mcx{position:absolute;top:12px;right:14px;width:36px;height:36px;border-radius:50%;border:none;background:var(--cream);color:var(--ink);font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 0 rgba(60,48,18,.15);}
.mcx:hover{background:var(--coral);color:#fff;}
.ovc h2{font-size:1.5rem;margin:6px 0 4px;font-family:var(--ui-font);font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;}
.ovc h3{font-size:1.05rem;margin:16px 0 4px;font-family:var(--ui-font);font-weight:700;color:var(--pond-deep);}
.ovc p{font-size:.9rem;margin:0 0 10px;font-family:var(--ui-font);}
.orow{display:flex;gap:10px;justify-content:center;margin:10px 0 14px;flex-wrap:wrap;}
.orow button{font-family:var(--ui-font);font-weight:700;font-size:1rem;padding:9px 13px;border-radius:14px;border:2px solid var(--leaf);background:#fff;cursor:pointer;color:var(--ink);}
.orow button:hover{background:var(--leaf);color:#fff;}
.orow button.sel{background:var(--leaf-deep);color:#fff;border-color:var(--leaf-deep);}
select{font-family:var(--ui-font);font-size:1rem;padding:9px 11px;border-radius:14px;border:2px solid var(--leaf);background:#fff;width:100%;max-width:300px;color:var(--ink);}
.pbtn{background:none;border:none;font-family:var(--ui-font);font-weight:700;font-size:1rem;color:var(--ink);text-decoration:underline;cursor:pointer;margin-top:12px;}
@media(prefers-reduced-motion:reduce){.frog{transition:none}.frog.hopping,.frog.catching{animation:none}.frog.catching .tongue-line,.frog.catching .tongue-tip,.frog.catching .tongue-tip-hl{animation:none}.card.win,.ripple{animation:none;opacity:0}.bug .bi{animation:none}}
@media(max-width:420px){.card{padding:30px 6%}.brand{font-size:1.4rem}}
</style>
</head>

// ── Word lists (100% decodable: short vowel, CVC/blends, no digraphs, no double-terminal) ──
const NAMES=["kim","tim","ben","sam","pam","tom","bob","dan","ken","nat","ned","ron","jan","pat","don"];
const ANIMAL_VERBS={
  pig:["run","dig","nap","sit","jump"],
  dog:["run","dig","sit","hop","jump"],
  fox:["run","dig","sit","jump"],
  hen:["run","sit","nap"],
  cub:["run","nap","sit","jump"],
  pup:["run","nap","sit","jump","dig"],
  rat:["run","dig","nap","sit"],
  cat:["run","nap","sit","jump"],
  bat:["flip"],
  ox:["run","dig"]
};
const ANIMALS=Object.keys(ANIMAL_VERBS);
const ADJ_ANIMAL=["big","fat","red","wet"];
const THINGS=["hat","bag","cap","mat","map","jam","net","pen","wig","lid","fin","box","log","mop","pot","rod","cup","jug","mug","nut","rug","tub","yam","fig","pod","bun","bin","tin","pin","van","fan","cab","pan","cot","rip","dip","sip","kid","mud","bed","kit","pit","top","tap","bat","dab"];
const SMALL_THINGS=["hat","bag","cap","map","jam","net","pen","wig","lid","fin","mop","pot","rod","cup","jug","mug","nut","rug","yam","fig","pod","bun","bin","tin","pin","fan","cab","pan","cot","dip","sip","kid","mud","bed","kit","pit","top","tap","dab"];
const ADJ_THING=["big","red","hot","wet","fat","sad","mad","bad","fun"];
const VI=["run","hop","jog","sit","dig","nap","jump","swim","flip","flop","trip","skip","stomp","drum","snap","stop","zip","pop","nod","hum"];
const VT=["get","grab","tap","rub","cut","grip","lift","hit","pet","set","hug"];
const VTF=["hug","pat","grab","get","tag","hit","pet","set"];
const PRON=["it","him","us"];
const VTO={
  get:THINGS,grab:THINGS,
  lift:["bag","box","log","mug","jug","pot","rod","mat","rug","cup","lid","tub"],
  tap:["pen","mug","cup","pot","box","lid","rod"],
  rub:["mat","rug","lid","pot","mop"],
  cut:["rug","mat","net","log","fig","bun","yam"],
  grip:["rod","bag","cup","mug","jug","pen","box"],
  hit:["pot","lid","box","drum","rod","log"],
  pet:["dog","cat","pup","rat","hen","cub"],
  set:["pot","cup","mug","jug","mat","lid","pan"],
  hug:["pup","cub","cat","dog","pig","rat"]
};
const LOC={
  run:[["on the sand","on sand"],["in the mud","in mud"]],
  hop:[["on a mat","on mat"],["on a log","on log"],["on the sand","on sand"]],
  jog:[["on the sand","on sand"],["on a mat","on mat"]],
  sit:[["on a mat","on mat"],["on a rug","on rug"],["in a tub","in tub"],["in a box","in box"]],
  dig:[["in the sand","in sand"],["in the mud","in mud"]],
  nap:[["on a mat","on mat"],["in a box","in box"]],
  jump:[["on a mat","on mat"],["in the mud","in mud"]],
  swim:[["in a pond","in pond"],["in a tub","in tub"],["in the mud","in mud"]],
  flip:[["on a mat","on mat"],["on a rug","on rug"]],
  flop:[["on a mat","on mat"],["in the mud","in mud"]],
  trip:[["on a rug","on rug"],["on a mat","on mat"]],
  skip:[["on the sand","on sand"],["on a mat","on mat"]],
  stomp:[["in the mud","in mud"],["on a mat","on mat"],["on a log","on log"]]
};
const LOC_V=Object.keys(LOC).filter(v=>VI.includes(v));
const IN_P=[["a box","box"],["a van","van"],["a cab","cab"],["a tub","tub"],["a bag","bag"]];

function pick(a){return a[Math.floor(Math.random()*a.length)];}
function art(n){if(state.sentenceStyle==="decodable")return n;return/^[aeiou]/i.test(n)?"an "+n:"a "+n;}
function locP(v){const p=pick(LOC[v]);return state.sentenceStyle==="decodable"?p[1]:p[0];}
function alvb(a){const ok=ANIMAL_VERBS[a].filter(v=>LOC[v]);return ok.length?pick(ok):null;}
function objF(v){return pick(VTO[v]||THINGS);}
function sObj(v){const a=(VTO[v]||THINGS).filter(t=>SMALL_THINGS.includes(t));return a.length?pick(a):pick(SMALL_THINGS);}
function nm(){return pick(NAMES);}

// ── Child-friendly sentence templates ──
const TMPL=[
  // simple "X can Y"
  ()=>`${nm()} can ${pick(VI)}.`,
  ()=>`${nm()} can ${pick(VI)}.`,
  ()=>`${nm()} can ${pick(VI)} fast.`,
  // animal "X can Y"
  ()=>{const a=pick(ANIMALS);return`${art(a)} can ${pick(ANIMAL_VERBS[a])}.`;},
  ()=>{const a=pick(ANIMALS);return`${art(a)} can ${pick(ANIMAL_VERBS[a])}.`;},
  ()=>{const a=pick(ANIMALS);return`${art(a)} can ${pick(ANIMAL_VERBS[a])} fast.`;},
  // adj animal
  ()=>{const a=pick(ANIMALS);return`${art(pick(ADJ_ANIMAL)+" "+a)} can ${pick(ANIMAL_VERBS[a])}.`;},
  // X can verb object
  ()=>{const v=pick(VT);return`${nm()} can ${v} ${art(objF(v))}.`;},
  ()=>{const v=pick(VT);return`${nm()} can ${v} ${art(objF(v))}.`;},
  // X had/got object
  ()=>`${nm()} had ${art(pick(THINGS))}.`,
  ()=>`${nm()} got ${art(pick(THINGS))}.`,
  // adj thing
  ()=>`${nm()} got ${art(pick(ADJ_THING)+" "+pick(THINGS))}.`,
  // X can verb pronoun
  ()=>`${nm()} can ${pick(VTF)} ${pick(PRON)}.`,
  // X can verb animal
  ()=>{const v=pick(["pet","hug","pat","get","tag"]);const a=pick(ANIMALS);return`${nm()} can ${v} ${art(a)}.`;},
  // X can Y location
  ()=>{const v=pick(LOC_V);return`${nm()} can ${v} ${locP(v)}.`;},
  ()=>{const v=pick(LOC_V);return`${nm()} can ${v} ${locP(v)}.`;},
  // animal can Y location
  ()=>{const a=pick(ANIMALS);const v=alvb(a);return v?`${art(a)} can ${v} ${locP(v)}.`:`${art(a)} can ${pick(ANIMAL_VERBS[a])}.`;},
  // X can verb thing in place
  ()=>{const v=pick(["get","grab","lift","grip"]);const t=sObj(v);let p=pick(IN_P),g=0;while(p[1]===t&&g++<8)p=pick(IN_P);const pl=state.sentenceStyle==="decodable"?p[1]:p[0];return`${nm()} can ${v} ${art(t)} in ${pl}.`;},
  // warm narrative sentences
  ()=>{const n1=nm();const n2=pick(NAMES.filter(n=>n!==n1));return`${n1} and ${n2} can ${pick(VI)}.`;},
  ()=>`${nm()} can ${pick(VT)} ${art(objF(pick(VT)))}.`,
  ()=>{const a=pick(ANIMALS);return`${nm()} has ${art(a)}.`;},
  ()=>{const a=pick(ANIMALS);return`${art(pick(ADJ_ANIMAL)+" "+a)} can hop.`;},
  ()=>`${nm()} can run and hop.`,
  ()=>`${nm()} can sit and nap.`,
];
function genSentence(){return pick(TMPL)().replace(/\s+/g," ").trim();}
function genRound(n){const s=new Set();let g=0;while(s.size<n&&g<n*60){s.add(genSentence());g++;}return Array.from(s);}

function landCenter(){

// ── Render sentence with per-letter spans ──
let wordEls=[];   // [{wordEl, ltrEls:[]}]
function renderSentence(txt){
  el.sentenceText.innerHTML="";wordEls=[];
  const tokens=txt.split(" ");
  tokens.forEach((w,wi)=>{
    const clean=w.replace(/[^a-z]/gi,"").toLowerCase();
    const punct=w.slice(clean.length); // trailing punctuation like "."
    const wSpan=document.createElement("span");
    wSpan.className="word";
    // build letter spans
    const ltrEls=[];
    clean.split("").forEach(ch=>{
      const ls=document.createElement("span");ls.className="ltr";ls.textContent=ch;
      wSpan.appendChild(ls);ltrEls.push(ls);
    });
    if(punct){wSpan.appendChild(document.createTextNode(punct));}
    wSpan.addEventListener("click",()=>speakWord(wi));
    wSpan.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();speakWord(wi);}});
    wSpan.setAttribute("role","button");wSpan.setAttribute("tabindex","0");
    el.sentenceText.appendChild(wSpan);
    if(wi<tokens.length-1)el.sentenceText.appendChild(document.createTextNode(" "));
    wordEls.push({wordEl:wSpan,ltrEls,clean});
  });
}

function clrAllHL(){
  wordEls.forEach(({wordEl,ltrEls})=>{
    wordEl.classList.remove("blend-on","sentence-hl");
    ltrEls.forEach(l=>l.classList.remove("ph-on"));
  });
}

function renderPads(){
  el.padsRow.innerHTML="";
  for(let i=0;i<state.roundLength;i++){
    const p=document.createElement("div");
    const done=i<state.index,active=i===state.index;
    p.className="pad"+(done?" done":active?" active":"");
    p.innerHTML=PAD_SVG;
    if(done){
      p.classList.add("tappable");p.setAttribute("role","button");p.setAttribute("tabindex","0");
      p.addEventListener("click",()=>goTo(i));
      p.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();goTo(i);}});
    }
    el.padsRow.appendChild(p);
  }
  requestAnimationFrame(()=>posAll(false));
}
function updateBadge(){if(el.pondCountDisplay)renderSandNumber(el.pondCountDisplay,state.pondsCompleted+1);}
function showSentence(){renderSentence(state.sentences[state.index]);renderPads();updateNavBtns();}
function updateNavBtns(){el.prevBtn.disabled=state.index<=0;el.nextBtn.disabled=state.index>=state.sentences.length-1;}

function highlightPad(idx){
  const pads=el.padsRow.querySelectorAll('.pad');
  const p=pads[idx];if(p)p.classList.add('next-active');return p;
}

// ── Speech ──
let sOk=false,sess=0,phSess=0;
function getVoice(){
  if(!sOk)return null;
  const vs=window.speechSynthesis.getVoices();if(!vs.length)return null;
  if(state.voiceName){const m=vs.find(v=>v.name===state.voiceName);if(m)return m;}
  return null;
}
function spk(text,rate,pitch,cb){
  if(!sOk){if(cb)cb();return;}
  const u=new SpeechSynthesisUtterance(text);
  u.rate=rate;u.pitch=pitch;
  const v=getVoice();if(v)u.voice=v;
  u.onend=()=>{if(cb)cb();};
  u.onerror=()=>{if(cb)cb();};
  window.speechSynthesis.speak(u);
}

// Speak full sentence word by word with sentence-level highlight
function toSpk(w){return w==="a"?"uh":w;}
function speakSentence(){
  if(!sOk)return;
  const my=++sess;phSess++;
  window.speechSynthesis.cancel();
  clrAllHL();
  let i=0;
  function nxt(){
    if(my!==sess)return;
    clrAllHL();
    if(i>=wordEls.length)return;
    const{wordEl,clean}=wordEls[i];
    wordEl.classList.add("sentence-hl");
    const last=i===wordEls.length-1;
    const txt=toSpk(clean)||".";
    spk(txt,state.speechRate,last?.9:1.02,()=>{
      i++;setTimeout(nxt,last?0:120);
    });
  }
  nxt();
}

// Speak a single word — highlight whole word and read it
function speakWord(wi){
  if(!sOk)return;
  const my=++phSess;sess++;
  window.speechSynthesis.cancel();
  clrAllHL();
  const{wordEl,clean}=wordEls[wi];
  if(!clean)return;
  wordEl.classList.add("blend-on");
  spk(toSpk(clean),state.speechRate,1.05,()=>{
    setTimeout(()=>{if(phSess===my)wordEl.classList.remove("blend-on");},350);
  });
}

function stopSpeech(){
  sess++;phSess++;
  if(sOk)window.speechSynthesis.cancel();
  clrAllHL();
}

// ── Navigation ──
let transitioning=false;
function goTo(ni){
  if(transitioning||ni<0||ni>=state.sentences.length||ni===state.index)return;
  transitioning=true;stopSpeech();
  const hl=highlightPad(ni);
  setTimeout(()=>{
    if(hl)hl.classList.remove('next-active');
    state.index=ni;
    const fc=padCenter(ni);if(fc!==null)setFrogPos(fc,true);
    el.frog.classList.add("hopping");el.trackBug.classList.add("fluttering");
    setTimeout(()=>{setBugPos(bugTargetPct(),true);},100);
    setTimeout(()=>{el.frog.classList.remove("hopping");el.trackBug.classList.remove("fluttering");showSentence();transitioning=false;},600);
  },480);
}

function runPondComplete(){
  const lc=landCenter();
  el.trackBug.classList.add("fluttering");setBugPos(lc,true);
  setTimeout(()=>{
    el.trackBug.classList.remove("fluttering");
    setFrogPos(lc,true);el.frog.classList.add("hopping");
    setTimeout(()=>{
      el.frog.classList.remove("hopping");
      el.frog.classList.add("catching");el.trackBug.classList.add("caught");
      setTimeout(()=>{
        el.frog.classList.remove("catching");el.trackBug.hidden=true;
        el.lilyCard.classList.add("win");
        const rip=document.createElement("div");rip.className="ripple";el.pondContainer.appendChild(rip);
        setTimeout(()=>rip.remove(),1000);
        setTimeout(()=>{
          el.lilyCard.classList.remove("win");
          renderSandNumber(el.pondNextNum,state.pondsCompleted+1);
          el.pondNextOverlay.hidden=false;
        },800);
      },520);
    },580);
  },520);
}

function nextStep(){
  if(transitioning)return;transitioning=true;stopSpeech();
  const ni=state.index+1;
  if(ni<state.roundLength){
    const hl=highlightPad(ni);
    setTimeout(()=>{
      if(hl)hl.classList.remove('next-active');
      const futureBugPct=(ni>=state.roundLength-1)
        ?landCenter()
        :(()=>{const c1=padCenter(ni),c2=padCenter(ni+1);return(c1!==null&&c2!==null)?(c1+c2)/2:50;})();
      el.trackBug.classList.add("fluttering");setBugPos(futureBugPct,true);
      setTimeout(()=>{
        el.trackBug.classList.remove("fluttering");
        const fc=padCenter(ni);if(fc!==null)setFrogPos(fc,true);
        el.frog.classList.add("hopping");
        setTimeout(()=>{el.frog.classList.remove("hopping");state.index=ni;showSentence();transitioning=false;},580);
      },260);
    },480);
  } else {
    state.pondsCompleted++;updateBadge();renderPads();
    runPondComplete();
  }
}

function resetBug(){el.trackBug.hidden=false;el.trackBug.classList.remove("caught","fluttering");}
function newPond(){
  stopSpeech();resetBug();
  state.sentences=genRound(state.roundLength);state.index=0;
  applyTheme(state.pondsCompleted+1);updateBadge();showSentence();
}

function populateVoices(){
  if(!sOk)return;
  const all=window.speechSynthesis.getVoices();
  const blocked=/zira|google us english|google uk english female|ravi/i;
  const en=all.filter(v=>v.lang&&v.lang.toLowerCase().startsWith("en")&&!blocked.test(v.name));
  const list=en.length?en:all.filter(v=>!blocked.test(v.name));
  if(!list.length)return;
  el.voiceSelect.innerHTML="";
  list.forEach(v=>{const o=document.createElement("option");o.value=v.name;o.textContent=(v.name+(v.lang?" ("+v.lang+")":"")).toLowerCase();el.voiceSelect.appendChild(o);});
  if(state.voiceName&&list.some(v=>v.name===state.voiceName)){el.voiceSelect.value=state.voiceName;}
  else{const p=list.find(v=>/heera/i.test(v.name))||list.find(v=>/natural|enhanced|premium|google|samantha|aria|jenny/i.test(v.name))||list[0];if(p){state.voiceName=p.name;el.voiceSelect.value=p.name;}}
}

function markSel(c,a,v){c.querySelectorAll("button").forEach(b=>b.classList.toggle("sel",b.getAttribute(a)===String(v)));}
function openSetting(){
  markSel(el.speedOptions,"data-speed",state.speechRate);
  markSel(el.styleOptions,"data-style",state.sentenceStyle);
  markSel(el.roundOptions,"data-n",state.roundLength);
  markSel(el.fontOptions,"data-font",state.readFont);
  el.settingsModal.hidden=false;
}
function closeSetting(){disarmReset();el.settingsModal.hidden=true;}
let resetArmed=false,resetTimer=null;
function armReset(){resetArmed=true;el.resetProgress.textContent="tap again to confirm";el.resetProgress.style.color="var(--coral-deep)";clearTimeout(resetTimer);resetTimer=setTimeout(disarmReset,4000);}
function disarmReset(){resetArmed=false;clearTimeout(resetTimer);el.resetProgress.textContent="reset all progress";el.resetProgress.style.color="var(--coral)";}
function doReset(){
  disarmReset();
  state.pondsCompleted=0;state.roundLength=5;state.speechRate=.78;state.sentenceStyle="decodable";state.readFont="dancing";
  el.pondNextOverlay.hidden=true;transitioning=false;
  applyFont();applyTheme(1);updateBadge();closeSetting();newPond();
}

function wireEvents(){
  el.readBtn.addEventListener("click",speakSentence);
  el.doneBtn.addEventListener("click",()=>{if(!transitioning)nextStep();});
  el.prevBtn.addEventListener("click",()=>goTo(state.index-1));
  el.nextBtn.addEventListener("click",()=>goTo(state.index+1));
  el.settingsBtn.addEventListener("click",openSetting);
  el.closeSettings.addEventListener("click",closeSetting);
  el.closeSettingsTop.addEventListener("click",closeSetting);
  el.btnLetsHop.addEventListener("click",()=>{el.pondNextOverlay.hidden=true;transitioning=false;newPond();});
  el.resetProgress.addEventListener("click",()=>{if(!resetArmed){armReset();return;}doReset();});
  el.roundOptions.querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{state.roundLength=parseInt(b.getAttribute("data-n"),10);closeSetting();newPond();}));
  el.styleOptions.querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{state.sentenceStyle=b.getAttribute("data-style");markSel(el.styleOptions,"data-style",state.sentenceStyle);newPond();closeSetting();}));
  el.fontOptions.querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{state.readFont=b.getAttribute("data-font");markSel(el.fontOptions,"data-font",state.readFont);applyFont();closeSetting();}));
  el.speedOptions.querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{state.speechRate=parseFloat(b.getAttribute("data-speed"));markSel(el.speedOptions,"data-speed",state.speechRate);}));
  el.voiceSelect.addEventListener("change",()=>{state.voiceName=el.voiceSelect.value;});
}

function init(){
  cacheEls();
  sOk="speechSynthesis" in window;
  if(!sOk)el.readBtn.disabled=true;
  else{window.speechSynthesis.onvoiceschanged=populateVoices;populateVoices();}
  applyFont();applyTheme(state.pondsCompleted+1);updateBadge();
  wireEvents();newPond();
}
document.addEventListener("DOMContentLoaded",init);
})();
</script>
</body>
</html>
