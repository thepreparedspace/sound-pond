<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>sound pond</title>
<link href="https://fonts.googleapis.com/css2?family=Andika:wght@400;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#E8E4D4;--pond:#4A7C68;--pond-deep:#346050;
  --leaf:#5A8C3C;--leaf-deep:#3C6828;
  --sun:#D49030;--coral:#B85830;--coral-deep:#8C3E1C;
  --ink:#382E18;--card-bg:#F8F4E4;
  --read-font:'Dancing Script',cursive;--ui-font:'Dancing Script',cursive;
  --sand-num-color:#C17A3A;
}
*{box-sizing:border-box;}[hidden]{display:none!important;}
html,body{margin:0;height:100%;}
body{font-family:var(--ui-font);color:var(--ink);min-height:100vh;overflow-x:hidden;
  background:var(--cream);display:flex;flex-direction:column;transition:background .8s;}
.sky{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.sun-w{position:absolute;top:8px;right:12px;width:76px;height:76px;}
.cl{position:absolute;}
.cl1{width:148px;height:56px;top:20px;left:4%;}
.cl2{width:106px;height:46px;top:72px;left:57%;}
.app{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;min-height:100vh;}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;gap:10px;flex-wrap:wrap;}
.brand{font-family:var(--ui-font);font-weight:800;font-size:1.7rem;display:flex;align-items:center;gap:8px;}
.brand svg{width:1.4em;height:1.1em;flex-shrink:0;}
.hdr{display:flex;align-items:center;gap:10px;margin-left:auto;}
.ibtn{background:var(--card-bg);border:none;width:42px;height:42px;border-radius:50%;cursor:pointer;
  box-shadow:0 2px 0 rgba(60,48,18,.15);display:flex;align-items:center;justify-content:center;color:var(--ink);}
.ibtn svg{width:22px;height:22px;}
.ibtn:focus-visible,.btn:focus-visible{outline:3px solid var(--coral);outline-offset:2px;}
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 16px 20px;gap:22px;}
.card{position:relative;background:var(--card-bg);width:min(640px,92vw);min-height:160px;
  border-radius:38% 62% 63% 37%/41% 44% 56% 59%;
  box-shadow:0 10px 0 rgba(56,46,24,.08),0 14px 30px rgba(60,96,50,.13);
  display:flex;align-items:center;justify-content:center;padding:38px 8%;
  border:4px solid var(--leaf);transition:transform .25s,border-color .8s;}
.card.win{animation:winPulse 0.8s ease;}
@keyframes winPulse{0%{transform:scale(1)}30%{transform:scale(1.04) rotate(-.5deg)}60%{transform:scale(1.02) rotate(.5deg)}100%{transform:scale(1)}}
.lfic{position:absolute;top:-13px;left:-13px;width:30px;height:30px;transform:rotate(-14deg);}
.sentence{font-family:var(--read-font);font-weight:700;font-size:clamp(1.9rem,5.4vw,3.1rem);text-align:center;line-height:1.6;}
.word{display:inline-block;padding:0 2px;border-radius:6px;cursor:pointer;transition:background .15s;}
.word:hover{background:rgba(212,144,48,.18);}
.word.sentence-hl{background:rgba(212,144,48,.38);color:var(--ink);}
.controls{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;}
.btn{font-family:var(--ui-font);font-weight:700;font-size:1.4rem;border:none;cursor:pointer;
  padding:14px 26px;border-radius:999px;color:#fff;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  box-shadow:0 5px 0 rgba(0,0,0,.14);transition:transform .08s,background-color .8s;}
.btn svg{width:1.1em;height:1.1em;flex-shrink:0;}
.btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.14);}
.btn-s{background:var(--coral)}.btn-s:hover{background:var(--coral-deep)}
.btn-d{background:var(--leaf-deep)}.btn-d:hover{opacity:.9}
.btn-n{background:var(--pond-deep);font-size:1rem;padding:14px 20px;}.btn-n:hover{opacity:.9}
.btn-icon{padding:14px 18px;}
.btn-icon .glyph{font-size:1.5em;line-height:1;font-weight:700;}
.btn:disabled{opacity:.3;cursor:not-allowed;}
.pond-path{padding:28px 0 38px;background:var(--pond);transition:background .8s;border-top:3px solid rgba(255,255,255,.1);overflow:visible;}
.track{position:relative;width:min(600px,90vw);margin:0 auto;padding:0 24px;height:80px;overflow:visible;}
.pads{position:relative;display:flex;justify-content:space-between;align-items:center;height:100%;margin-right:52px;}
.land-bank{position:absolute;right:-8px;top:50%;transform:translateY(-62%);width:58px;height:52px;pointer-events:none;z-index:2;}
.land-bank svg{width:100%;height:100%;display:block;filter:drop-shadow(0 3px 3px rgba(10,20,5,.24));}
.pad{width:46px;height:46px;position:relative;transition:transform .3s,opacity .3s;}
.pad svg{width:100%;height:100%;display:block;filter:drop-shadow(0 3px 3px rgba(10,22,8,.25));transition:filter .3s;}
.pad.done{opacity:.72;transform:scale(.85);}
.pad.active{transform:scale(1.13);}
.pad.active svg{filter:drop-shadow(0 3px 3px rgba(10,22,8,.25)) drop-shadow(0 0 9px rgba(255,255,255,.88)) drop-shadow(0 0 4px rgba(255,255,255,.70));}
.pad.next-active svg{filter:drop-shadow(0 3px 3px rgba(10,22,8,.25)) drop-shadow(0 0 12px rgba(255,255,255,.95)) drop-shadow(0 0 5px rgba(255,255,255,.75));animation:padBeckon .5s ease-out;}
@keyframes padBeckon{0%{filter:drop-shadow(0 3px 3px rgba(10,22,8,.25));}55%{filter:drop-shadow(0 3px 3px rgba(10,22,8,.25)) drop-shadow(0 0 18px rgba(255,255,255,1)) drop-shadow(0 0 9px rgba(255,255,255,.95));}100%{filter:drop-shadow(0 3px 3px rgba(10,22,8,.25)) drop-shadow(0 0 12px rgba(255,255,255,.95)) drop-shadow(0 0 5px rgba(255,255,255,.75));}}
.pad.tappable{cursor:pointer;}
.pad.tappable:hover{transform:scale(.93);opacity:.9;}
.frog{position:absolute;top:50%;left:0;width:72px;height:60px;transform:translate(-50%,-68%);
  transition:left .55s cubic-bezier(.34,1.56,.64,1);
  filter:drop-shadow(0 5px 3px rgba(0,0,0,.22));pointer-events:none;z-index:3;overflow:visible;}
.frog svg{width:100%;height:100%;display:block;}
.frog.hopping{animation:hop .55s ease;}
@keyframes hop{0%{transform:translate(-50%,-68%) scale(1,1)}35%{transform:translate(-50%,-158%) scale(.9,1.14)}70%{transform:translate(-50%,-68%) scale(1.06,.9)}100%{transform:translate(-50%,-68%) scale(1,1)}}
.frog.catching{animation:snap .5s ease;}
@keyframes snap{0%{transform:translate(-50%,-68%)}25%{transform:translate(-50%,-92%) scale(1.1,.9) rotate(4deg)}55%{transform:translate(-50%,-68%) scale(1.04,.97)}100%{transform:translate(-50%,-68%)}}
.tongue-line{stroke-dasharray:50;stroke-dashoffset:50;}
.tongue-tip,.tongue-tip-hl{opacity:0;}
.frog.catching .tongue-line{animation:tongueFlick .5s ease;}
.frog.catching .tongue-tip,.frog.catching .tongue-tip-hl{animation:tongueTip .5s ease;}
@keyframes tongueFlick{0%{stroke-dashoffset:50;}30%{stroke-dashoffset:0;}62%{stroke-dashoffset:0;}100%{stroke-dashoffset:50;}}
@keyframes tongueTip{0%{opacity:0;}28%{opacity:0;}38%{opacity:1;}60%{opacity:1;}78%{opacity:0;}100%{opacity:0;}}
.bug{position:absolute;top:50%;left:0;width:32px;height:26px;transform:translate(-50%,-210%);
  transition:left .5s cubic-bezier(.34,1.56,.64,1),transform .4s,opacity .4s;pointer-events:none;z-index:4;}
.bug .bi{width:100%;height:100%;animation:bidle 2.3s ease-in-out infinite;}
.bug svg{width:100%;height:100%;display:block;filter:drop-shadow(0 2px 1px rgba(0,0,0,.2));}
.bug.fluttering .bi{animation:bflut .5s ease;}
@keyframes bidle{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-6px) rotate(3deg)}}
@keyframes bflut{0%{transform:translateY(0)}40%{transform:translateY(-16px) rotate(-8deg)}70%{transform:translateY(-3px) rotate(5deg)}100%{transform:translateY(0)}}
.bug.caught{transform:translate(-50%,-68%) scale(.1);opacity:0;transition:transform .4s,opacity .4s;}
.sand-num{font-family:'Andika',sans-serif;font-weight:700;color:var(--sand-num-color);line-height:1;display:inline-block;}
.badge-sand{font-size:1.15rem;}
.overlay-sand{font-size:5.6rem;text-shadow:2px 2px 0 rgba(138,74,18,.18),0 4px 0 rgba(138,74,18,.10);}
.pond-next-overlay{position:fixed;inset:0;z-index:70;display:flex;align-items:center;justify-content:center;background:rgba(30,50,20,.42);padding:20px;}
.pond-next-card{background:var(--card-bg);border-radius:32px;padding:40px 40px 34px;max-width:280px;width:100%;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,.2),0 0 0 3px var(--leaf);display:flex;flex-direction:column;align-items:center;gap:16px;animation:cardPop .4s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes cardPop{0%{transform:scale(.72);opacity:0}100%{transform:scale(1);opacity:1}}
.pond-next-label{font-family:var(--ui-font);font-size:1.15rem;color:var(--pond-deep);margin:0;opacity:.75;}
.pond-next-btn{background:var(--leaf-deep);font-family:var(--ui-font);font-weight:700;font-size:1.5rem;border:none;cursor:pointer;padding:14px 32px;border-radius:999px;color:#fff;box-shadow:0 5px 0 rgba(0,0,0,.16);display:inline-flex;align-items:center;gap:8px;}
.pond-next-btn:hover{opacity:.92;}
.ripple{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:3px solid rgba(255,255,255,.42);border-radius:50%;width:0;height:0;animation:rOut 1s cubic-bezier(.1,.8,.3,1) forwards;pointer-events:none;z-index:10;}
@keyframes rOut{0%{width:0;height:0;opacity:.9}100%{width:600px;height:600px;opacity:0}}
.badge{display:flex;align-items:center;gap:5px;background:var(--card-bg);border-radius:999px;padding:5px 12px;font-size:1rem;font-weight:700;box-shadow:0 2px 0 rgba(60,48,18,.12);color:var(--ink);font-family:var(--ui-font);}
.badge svg{width:15px;height:15px;flex-shrink:0;}
.ov{position:fixed;inset:0;background:rgba(48,40,20,.44);display:flex;align-items:center;justify-content:center;z-index:60;padding:16px;}
.ovc{background:var(--card-bg);border-radius:28px;max-width:400px;width:100%;max-height:86vh;display:flex;flex-direction:column;text-align:center;box-shadow:0 16px 40px rgba(0,0,0,.15);overflow:hidden;text-transform:lowercase;}
.mhdr{position:relative;padding:22px 50px 6px 26px;flex:0 0 auto;}
.mbdy{padding:0 26px 26px;overflow-y:auto;flex:1 1 auto;}
.mcx{position:absolute;top:12px;right:14px;width:36px;height:36px;border-radius:50%;border:none;background:var(--cream);color:var(--ink);font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mcx:hover{background:var(--coral);color:#fff;}
.ovc h2{font-size:1.5rem;margin:6px 0 4px;font-family:var(--ui-font);font-weight:700;}
.ovc h3{font-size:1.05rem;margin:16px 0 4px;font-family:var(--ui-font);font-weight:700;color:var(--pond-deep);}
.ovc p{font-size:.9rem;margin:0 0 10px;font-family:var(--ui-font);}
.orow{display:flex;gap:10px;justify-content:center;margin:10px 0 14px;flex-wrap:wrap;}
.orow button{font-family:var(--ui-font);font-weight:700;font-size:1rem;padding:9px 13px;border-radius:14px;border:2px solid var(--leaf);background:#fff;cursor:pointer;color:var(--ink);}
.orow button:hover{background:var(--leaf);color:#fff;}
.orow button.sel{background:var(--leaf-deep);color:#fff;border-color:var(--leaf-deep);}
select{font-family:var(--ui-font);font-size:1rem;padding:9px 11px;border-radius:14px;border:2px solid var(--leaf);background:#fff;width:100%;max-width:300px;color:var(--ink);}
.pbtn{background:none;border:none;font-family:var(--ui-font);font-weight:700;font-size:1rem;color:var(--ink);text-decoration:underline;cursor:pointer;margin-top:12px;}
@media(max-width:420px){.card{padding:30px 6%}.brand{font-size:1.4rem}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<div class="sky" aria-hidden="true">
  <div class="sun-w"><svg viewBox="0 0 80 80"><defs><radialGradient id="sg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#F8D860"/><stop offset="45%" stop-color="#E0A030" stop-opacity=".7"/><stop offset="100%" stop-color="#C07810" stop-opacity="0"/></radialGradient></defs><circle cx="40" cy="40" r="39" fill="url(#sg)"/><circle cx="40" cy="40" r="20" fill="#E8B04C"/></svg></div>
  <div class="cl cl1"><svg viewBox="0 0 148 56"><defs><linearGradient id="cg1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFFEFB"/><stop offset="100%" stop-color="#E4E0D0"/></linearGradient></defs><ellipse cx="74" cy="44" rx="64" ry="13" fill="url(#cg1)" opacity=".86"/><ellipse cx="40" cy="28" rx="30" ry="23" fill="url(#cg1)" opacity=".86"/><ellipse cx="86" cy="22" rx="27" ry="20" fill="url(#cg1)" opacity=".86"/><ellipse cx="116" cy="32" rx="22" ry="17" fill="url(#cg1)" opacity=".86"/></svg></div>
  <div class="cl cl2"><svg viewBox="0 0 106 46"><defs><linearGradient id="cg2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFFEFB"/><stop offset="100%" stop-color="#E4E0D0"/></linearGradient></defs><ellipse cx="53" cy="36" rx="48" ry="11" fill="url(#cg2)" opacity=".8"/><ellipse cx="30" cy="23" rx="22" ry="17" fill="url(#cg2)" opacity=".8"/><ellipse cx="68" cy="19" rx="20" ry="15" fill="url(#cg2)" opacity=".8"/><ellipse cx="90" cy="28" rx="16" ry="13" fill="url(#cg2)" opacity=".8"/></svg></div>
</div>

<div class="app">
<header>
  <div class="brand">
    <svg viewBox="0 0 36 26" aria-hidden="true">
      <ellipse cx="18" cy="19" rx="13" ry="7" fill="var(--leaf)" stroke="var(--leaf-deep)" stroke-width="1.5"/>
      <circle cx="9" cy="9" r="6" fill="var(--leaf)" stroke="var(--leaf-deep)" stroke-width="1.5"/>
      <circle cx="21" cy="7" r="6.5" fill="var(--leaf)" stroke="var(--leaf-deep)" stroke-width="1.5"/>
      <ellipse cx="9" cy="9" rx="3" ry="1.3" fill="#D4A828"/>
      <ellipse cx="21" cy="7" rx="3.2" ry="1.3" fill="#D4A828"/>

      <ellipse cx="21" cy="7" rx="1.8" ry=".9" fill="#1A1008"/>
    </svg>
    sound pond
  </div>
  <div class="hdr">
    <div class="badge" id="pondBadge">
      <svg viewBox="0 0 20 20" aria-hidden="true"><path d="M3 17 C3 9 8 4 17 3 C16 10 10 15 3 17Z" fill="var(--leaf-deep)"/></svg>

      <span class="sand-num badge-sand" id="pondCountDisplay">1</span>

      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.1" fill="none" stroke="currentColor" stroke-width="1.7"/><path d="M12 4.6V7M12 17v2.4M4.6 12H7M17 12h2.4M6.7 6.7l1.7 1.7M15.6 15.6l1.7 1.7M17.3 6.7l-1.7 1.7M8.4 15.6l-1.7 1.7" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
    </button>
  </div>
</header>

<main>
  <div class="card" id="lilyCard">
    <span class="lfic" aria-hidden="true">
      <svg viewBox="0 0 28 28"><path d="M5 22 C5 13 10 5 22 4 C21 12 14 18 5 22Z" fill="var(--leaf-deep)" opacity=".9"/></svg>
    </span>
    <div class="sentence" id="sentenceText">&nbsp;</div>
  </div>
  <div class="controls">
    <button class="btn btn-n btn-icon" id="prevBtn" aria-label="go back" disabled>
      <span class="glyph">←</span>
    </button>
    <button class="btn btn-s" id="readBtn">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 9.5H8L13 5.5V18.5L8 14.5H4Z" fill="currentColor"/><path d="M16.5 8.5C18.5 10 18.5 14 16.5 15.5" stroke="currentColor" stroke-width="1.7" fill="none" stroke-linecap="round"/><path d="M19 6.5C22.5 9.5 22.5 14.5 19 17.5" stroke="currentColor" stroke-width="1.7" fill="none" stroke-linecap="round" opacity=".65"/></svg>
      hop
    </button>
    <button class="btn btn-d btn-icon" id="doneBtn" aria-label="done">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12.5L9.5 17L19 6.5" stroke="currentColor" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
</main>

<div class="pond-path">
  <div class="track" id="pondContainer">
    <div class="pads" id="padsRow"></div>

        <ellipse cx="29" cy="45" rx="27" ry="8" fill="#4A7030"/>

    </div>

    <div class="frog" id="frog" aria-hidden="true">

          <radialGradient id="fb" cx="42%" cy="32%" r="76%"><stop offset="0%" stop-color="#8A9C68"/><stop offset="52%" stop-color="#647848"/><stop offset="100%" stop-color="#485830"/></radialGradient>

        <!-- right hind leg -->
        <path d="M74 83 C71 93 75 102 83 104 C89 105 92 101 90 95 C88 90 83 87 78 83Z" fill="#586840"/>
        <path d="M82 103 q1 4 0 8M86 101 q3 4 3 8M89 98 q3 3 3 7" stroke="#384828" stroke-width="1.7" fill="none" stroke-linecap="round"/>
        <!-- eyes -->
        <circle cx="102" cy="34" r="14" fill="#3A5028"/>
        <circle cx="121" cy="29" r="14" fill="#3A5028"/>
        <circle cx="102" cy="34" r="9.5" fill="url(#fe)"/>
        <circle cx="121" cy="29" r="9.5" fill="url(#fe)"/>

  <path d="M27 5 q-2 -3 -5 -3M33 5 q2 -3 5 -3" stroke="#6E5326" stroke-width="1.1" fill="none" stroke-linecap="round"/></svg>`

const PAD_SVG=`<svg viewBox="0 0 100 100" aria-hidden="true"><defs><radialGradient id="pg" cx="40%" cy="35%" r="78%"><stop offset="0%" stop-color="#B8D898"/><stop offset="55%" stop-color="#88B468"/><stop offset="100%" stop-color="#608448"/></radialGradient></defs><ellipse cx="52" cy="95" rx="36" ry="5.5" fill="rgba(18,38,10,.17)"/><path d="M50 56 L52.51 16.08 A40 40 0 1 1 47.49 16.08 Z" fill="url(#pg)" stroke="#486830" stroke-width="2"/><path d="M50 56L50 96M50 56L84 76M50 56L90 44M50 56L73 17M50 56L27 17M50 56L10 44M50 56L16 76" stroke="#486830" stroke-width=".9" opacity=".4" fill="none"/><ellipse cx="38" cy="36" rx="12" ry="6.5" fill="rgba(255,255,255,.14)" transform="rotate(-18 38 36)"/></svg>`;

const FONTS={andika:"'Andika',sans-serif",dancing:"'Dancing Script',cursive"};
const THEMES=[
  {sky:"#E8E4D4",water:"#4A7C68",leaf:"#5A8C3C",leafD:"#3C6828"},
  {sky:"#E4DEC8",water:"#5A8090",leaf:"#4A8050",leafD:"#306038"},
  {sky:"#E4D8C0",water:"#A07848",leaf:"#90884C",leafD:"#686030"},
  {sky:"#485860",water:"#304850",leaf:"#4A5C48",leafD:"#384430"}
];

function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function pickExcept(a,ex){const f=a.filter(x=>x!==ex);return f.length?pick(f):pick(a);}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

// ── Sentence builders ──
// Each returns {text, type:'past'|'can', name, animal, verb, location}

function b1_nameVerb(last){
  const name=pickExcept(NAMES,last.name);
  const verb=pickExcept(PAST_VERBS,last.verb);
  return{text:`${cap(name)} ${verb}.`,type:'past',name,animal:null,verb,location:null};
}
function b2_nameVerbLoc(last){
  const name=pickExcept(NAMES,last.name);
  const verb=pickExcept(PAST_VERBS,last.verb);
  const pool=LOCS_PAST[verb].filter(l=>l!==last.location);
  const location=pick(pool.length?pool:LOCS_PAST[verb]);
  return{text:`${cap(name)} ${verb} ${location}.`,type:'past',name,animal:null,verb,location};
}
function b3_nameCanVerb(last){
  const name=pickExcept(NAMES,last.name);
  const verb=pickExcept(CAN_VERBS,last.verb);
  return{text:`${cap(name)} can ${verb}.`,type:'can',name,animal:null,verb,location:null};
}
function b4_nameCanVerbLoc(last){
  const name=pickExcept(NAMES,last.name);
  const verb=pickExcept(CAN_VERBS,last.verb);
  const pool=(LOCS_CAN[verb]||LOCS_CAN.run).filter(l=>l!==last.location);
  const location=pick(pool.length?pool:LOCS_CAN[verb]||LOCS_CAN.run);
  return{text:`${cap(name)} can ${verb} ${location}.`,type:'can',name,animal:null,verb,location};
}
function b5_animalVerbLoc(last){
  const verb=pickExcept(PAST_VERBS,last.verb);
  const aPool=(ANIMAL_COMPAT_PAST[verb]||ANIMALS).filter(a=>a!==last.animal);
  const animal=pick(aPool.length?aPool:ANIMAL_COMPAT_PAST[verb]||ANIMALS);
  const lPool=LOCS_PAST[verb].filter(l=>l!==last.location);
  const location=pick(lPool.length?lPool:LOCS_PAST[verb]);
  return{text:`${cap(animal)} ${verb} ${location}.`,type:'past',name:null,animal,verb,location};
}
function b6_animalCanVerbLoc(last){
  const verb=pickExcept(CAN_VERBS,last.verb);
  const aPool=(ANIMAL_COMPAT_CAN[verb]||ANIMALS).filter(a=>a!==last.animal);
  const animal=pick(aPool.length?aPool:ANIMAL_COMPAT_CAN[verb]||ANIMALS);
  const lPool=(LOCS_CAN[verb]||LOCS_CAN.run).filter(l=>l!==last.location);
  const location=pick(lPool.length?lPool:LOCS_CAN[verb]||LOCS_CAN.run);
  return{text:`${cap(animal)} can ${verb} ${location}.`,type:'can',name:null,animal,verb,location};
}
function b7_adjAnimalVerbLoc(last){
  const verb=pickExcept(PAST_VERBS,last.verb);
  const aPool=(ANIMAL_COMPAT_PAST[verb]||ANIMALS).filter(a=>a!==last.animal);
  const animal=pick(aPool.length?aPool:ANIMAL_COMPAT_PAST[verb]||ANIMALS);
  const adj=pick(ADJS);
  const lPool=LOCS_PAST[verb].filter(l=>l!==last.location);
  const location=pick(lPool.length?lPool:LOCS_PAST[verb]);
  return{text:`${cap(adj)} ${animal} ${verb} ${location}.`,type:'past',name:null,animal,verb,location};
}
function b8_adjAnimalCanVerbLoc(last){
  const verb=pickExcept(CAN_VERBS,last.verb);
  const aPool=(ANIMAL_COMPAT_CAN[verb]||ANIMALS).filter(a=>a!==last.animal);
  const animal=pick(aPool.length?aPool:ANIMAL_COMPAT_CAN[verb]||ANIMALS);
  const adj=pick(ADJS);
  const lPool=(LOCS_CAN[verb]||LOCS_CAN.run).filter(l=>l!==last.location);
  const location=pick(lPool.length?lPool:LOCS_CAN[verb]||LOCS_CAN.run);
  return{text:`${cap(adj)} ${animal} can ${verb} ${location}.`,type:'can',name:null,animal,verb,location};
}

// Past builders (categories 1,2,5,7) and can builders (3,4,6,8)
const PAST_BUILDERS=[b1_nameVerb,b2_nameVerbLoc,b5_animalVerbLoc,b7_adjAnimalVerbLoc];
const CAN_BUILDERS=[b3_nameCanVerb,b4_nameCanVerbLoc,b6_animalCanVerbLoc,b8_adjAnimalCanVerbLoc];

// ── Verb base map — treats ran/run, sat/sit etc. as same verb ──
const VERB_BASE={ran:"run",sat:"sit",dug:"dig",swam:"swim",
  run:"run",sit:"sit",dig:"dig",swim:"swim",
  hop:"hop",jog:"jog",zip:"zip",nap:"nap"};
function verbBase(v){return VERB_BASE[v]||v;}

// ── Session-level used sentences set ──
let usedSentences=new Set();

function genRound(n){
  const sentences=[];
  let last={type:null,name:null,animal:null,verb:null,location:null};
  // Track verb bases used in this pond — no verb base repeats within a pond
  const usedVerbBases=new Set();
  // Shuffle builder pools each pond for variety
  const pastPool=shuffle([...PAST_BUILDERS]);
  const canPool=shuffle([...CAN_BUILDERS]);
  let pi=0,ci=0;
  // Strict alternation: start with past or can randomly
  let nextType=Math.random()<.5?'past':'can';

  let attempts=0;
  while(sentences.length<n&&attempts<n*60){
    attempts++;
    const builders=nextType==='past'?pastPool:canPool;
    const idx=nextType==='past'?pi%pastPool.length:ci%canPool.length;
    const builder=builders[idx];
    const s=builder(last);
    const vb=verbBase(s.verb);
    // Check not used in session
    if(usedSentences.has(s.text)){
      if(nextType==='past')pi++;else ci++;
      continue;
    }
    // Check verb base not already used in this pond
    if(usedVerbBases.has(vb)){
      if(nextType==='past')pi++;else ci++;
      continue;
    }
    // Check no consecutive same name/animal/location
    if((s.name&&s.name===last.name)||(s.animal&&s.animal===last.animal)||(s.location&&s.location===last.location)){
      if(nextType==='past')pi++;else ci++;
      continue;
    }
    usedSentences.add(s.text);
    usedVerbBases.add(vb);
    sentences.push(s.text);
    last=s;
    if(nextType==='past')pi++;else ci++;
    nextType=nextType==='past'?'can':'past';
  }
  // If pool exhausted, reset and try again
  if(sentences.length<n){
    usedSentences.clear();
    return genRound(n);
  }
  return sentences;
}

// ── State ──
let state={roundLength:5,speechRate:.78,voiceName:null,readFont:"dancing",sentences:[],index:0,pondsCompleted:0};
const el={};

function cacheEls(){

function applyTheme(n){

  document.documentElement.style.setProperty("--leaf-deep",t.leafD);
  if(el.bugInner)el.bugInner.innerHTML=BUGS[(n-1)%BUGS.length];
}
function applyFont(){
  document.documentElement.style.setProperty("--read-font",FONTS[state.readFont]||FONTS.dancing);
}

// ── Positioning ──
function padCenter(i){
  const pads=el.padsRow.querySelectorAll('.pad');if(!pads[i])return null;
  const tr=el.pondContainer.getBoundingClientRect(),pd=pads[i].getBoundingClientRect();
  return((pd.left+pd.width/2-tr.left)/tr.width)*100;
}
function landCenter(){
  if(!el.landBank)return 96;
  const tr=el.pondContainer.getBoundingClientRect(),lb=el.landBank.getBoundingClientRect();
  return((lb.left+lb.width/2-tr.left)/tr.width)*100;
}
function bugTargetPct(){
  if(state.index>=state.roundLength-1)return landCenter();
  const c1=padCenter(state.index),c2=padCenter(state.index+1);
  return(c1!==null&&c2!==null)?(c1+c2)/2:50;
}
function setFrogPos(pct,anim){
  if(!anim)el.frog.style.transition="none";
  el.frog.style.left=pct+"%";
  if(!anim)requestAnimationFrame(()=>{el.frog.style.transition="";});
}
function setBugPos(pct,anim){
  if(!anim)el.trackBug.style.transition="none";
  el.trackBug.style.left=pct+"%";
  if(!anim)requestAnimationFrame(()=>{el.trackBug.style.transition="";});
}
function posAll(){
  const fc=padCenter(Math.min(state.index,state.roundLength-1));
  if(fc!==null)setFrogPos(fc,false);
  setBugPos(bugTargetPct(),false);
}

// ── Render ──
let wordEls=[];
function renderSentence(txt){
  el.sentenceText.innerHTML="";wordEls=[];
  const tokens=txt.split(" ");
  tokens.forEach((w,wi)=>{
    const clean=w.replace(/[^a-z]/gi,"").toLowerCase();
    const punct=w.slice(clean.length);
    const sp=document.createElement("span");sp.className="word";
    clean.split("").forEach(ch=>{const l=document.createElement("span");l.className="ltr";l.textContent=ch;sp.appendChild(l);});
    if(punct)sp.appendChild(document.createTextNode(punct));
    sp.addEventListener("click",()=>speakWord(wi));
    sp.setAttribute("role","button");sp.setAttribute("tabindex","0");
    el.sentenceText.appendChild(sp);
    if(wi<tokens.length-1)el.sentenceText.appendChild(document.createTextNode(" "));
    wordEls.push({wordEl:sp,clean});
  });
}
function clrHL(){wordEls.forEach(({wordEl})=>wordEl.classList.remove("sentence-hl"));}

function renderPads(){
  el.padsRow.innerHTML="";
  for(let i=0;i<state.roundLength;i++){
    const p=document.createElement("div");
    p.className="pad"+(i<state.index?" done":i===state.index?" active":"");
    p.innerHTML=PAD_SVG;
    if(i<state.index){
      p.classList.add("tappable");p.setAttribute("role","button");p.setAttribute("tabindex","0");
      p.addEventListener("click",()=>goTo(i));
    }
    el.padsRow.appendChild(p);
  }
  requestAnimationFrame(posAll);
}
function updateBadge(){if(el.pondCountDisplay)el.pondCountDisplay.textContent=state.pondsCompleted+1;}
function showSentence(){renderSentence(state.sentences[state.index]);renderPads();el.prevBtn.disabled=state.index<=0;}

// ── Speech ──
let sOk=false,sess=0;
function getVoice(){
  if(!sOk)return null;
  const vs=window.speechSynthesis.getVoices();
  if(state.voiceName){const m=vs.find(v=>v.name===state.voiceName);if(m)return m;}
  return null;
}
function spk(text,rate,pitch,cb){
  if(!sOk){if(cb)cb();return;}
  const u=new SpeechSynthesisUtterance(text);
  u.rate=rate;u.pitch=pitch;
  const v=getVoice();if(v)u.voice=v;
  u.onend=()=>{if(cb)cb();};u.onerror=()=>{if(cb)cb();};
  window.speechSynthesis.speak(u);
}
function speakSentence(){
  if(!sOk)return;
  const my=++sess;window.speechSynthesis.cancel();clrHL();
  let i=0;
  function nxt(){
    if(my!==sess)return;clrHL();
    if(i>=wordEls.length)return;
    const{wordEl,clean}=wordEls[i];
    wordEl.classList.add("sentence-hl");
    const last=i===wordEls.length-1;
    spk(clean||".",state.speechRate,last?.9:1.02,()=>{i++;setTimeout(nxt,last?0:120);});
  }
  nxt();
}
function speakWord(wi){
  if(!sOk)return;
  sess++;window.speechSynthesis.cancel();clrHL();
  const{wordEl,clean}=wordEls[wi];if(!clean)return;
  wordEl.classList.add("sentence-hl");
  spk(clean,state.speechRate,1.05,()=>{setTimeout(()=>wordEl.classList.remove("sentence-hl"),350);});
}
function stopSpeech(){sess++;if(sOk)window.speechSynthesis.cancel();clrHL();}

// ── Navigation ──
let transitioning=false;
function goTo(ni){
  if(transitioning||ni<0||ni>=state.sentences.length||ni===state.index)return;
  transitioning=true;stopSpeech();
  const pads=el.padsRow.querySelectorAll('.pad');
  if(pads[ni])pads[ni].classList.add('next-active');
  setTimeout(()=>{
    if(pads[ni])pads[ni].classList.remove('next-active');
    state.index=ni;
    const fc=padCenter(ni);if(fc!==null)setFrogPos(fc,true);
    el.frog.classList.add("hopping");el.trackBug.classList.add("fluttering");
    setTimeout(()=>setBugPos(bugTargetPct(),true),100);
    setTimeout(()=>{el.frog.classList.remove("hopping");el.trackBug.classList.remove("fluttering");showSentence();transitioning=false;},600);
  },480);
}

function runPondComplete(){
  const lc=landCenter();
  el.trackBug.classList.add("fluttering");setBugPos(lc,true);
  setTimeout(()=>{
    el.trackBug.classList.remove("fluttering");
    setFrogPos(lc,true);el.frog.classList.add("hopping");
    setTimeout(()=>{
      el.frog.classList.remove("hopping");
      el.frog.classList.add("catching");el.trackBug.classList.add("caught");
      setTimeout(()=>{
        el.frog.classList.remove("catching");el.trackBug.hidden=true;
        el.lilyCard.classList.add("win");
        const rip=document.createElement("div");rip.className="ripple";el.pondContainer.appendChild(rip);
        setTimeout(()=>rip.remove(),1000);
        setTimeout(()=>{
          el.lilyCard.classList.remove("win");
          el.pondNextNum.textContent=state.pondsCompleted+1;
          el.pondNextOverlay.hidden=false;
        },800);
      },520);
    },580);
  },520);
}

function nextStep(){
  if(transitioning)return;transitioning=true;stopSpeech();
  const ni=state.index+1;
  if(ni<state.roundLength){
    const pads=el.padsRow.querySelectorAll('.pad');
    if(pads[ni])pads[ni].classList.add('next-active');
    setTimeout(()=>{
      if(pads[ni])pads[ni].classList.remove('next-active');
      const futureBugPct=ni>=state.roundLength-1?landCenter()
        :(()=>{const c1=padCenter(ni),c2=padCenter(ni+1);return c1!==null&&c2!==null?(c1+c2)/2:50;})();
      el.trackBug.classList.add("fluttering");setBugPos(futureBugPct,true);
      setTimeout(()=>{
        el.trackBug.classList.remove("fluttering");
        const fc=padCenter(ni);if(fc!==null)setFrogPos(fc,true);
        el.frog.classList.add("hopping");
        setTimeout(()=>{el.frog.classList.remove("hopping");state.index=ni;showSentence();transitioning=false;},580);
      },260);
    },480);
  }else{
    state.pondsCompleted++;updateBadge();renderPads();runPondComplete();
  }
}

function resetBug(){el.trackBug.hidden=false;el.trackBug.classList.remove("caught","fluttering");}
function newPond(){
  stopSpeech();resetBug();
  state.sentences=genRound(state.roundLength);
  state.index=0;
  applyTheme(state.pondsCompleted+1);
  updateBadge();showSentence();
}

function populateVoices(){
  if(!sOk)return;
  const all=window.speechSynthesis.getVoices();
  const blocked=/zira|google us english|google uk english female|ravi/i;
  const en=all.filter(v=>v.lang&&v.lang.toLowerCase().startsWith("en")&&!blocked.test(v.name));
  const list=en.length?en:all.filter(v=>!blocked.test(v.name));
  if(!list.length)return;
  el.voiceSelect.innerHTML="";
  list.forEach(v=>{const o=document.createElement("option");o.value=v.name;o.textContent=(v.name+(v.lang?" ("+v.lang+")":"")).toLowerCase();el.voiceSelect.appendChild(o);});
  if(state.voiceName&&list.some(v=>v.name===state.voiceName)){el.voiceSelect.value=state.voiceName;}
  else{const p=list.find(v=>/natural|enhanced|premium|google|samantha|aria|jenny/i.test(v.name))||list[0];if(p){state.voiceName=p.name;el.voiceSelect.value=p.name;}}
}

function markSel(c,a,v){c.querySelectorAll("button").forEach(b=>b.classList.toggle("sel",b.getAttribute(a)===String(v)));}
function openSetting(){
  markSel(el.speedOptions,"data-speed",state.speechRate);
  markSel(el.roundOptions,"data-n",state.roundLength);
  markSel(el.fontOptions,"data-font",state.readFont);
  el.settingsModal.hidden=false;
}
function closeSetting(){el.settingsModal.hidden=true;}

let resetArmed=false,resetTimer=null;
function armReset(){
  resetArmed=true;
  el.resetProgress.textContent="tap again to confirm";
  clearTimeout(resetTimer);
  resetTimer=setTimeout(()=>{resetArmed=false;el.resetProgress.textContent="reset all progress";},4000);
}
function doReset(){
  resetArmed=false;clearTimeout(resetTimer);
  state.pondsCompleted=0;state.roundLength=5;state.speechRate=.78;state.readFont="dancing";
  usedSentences.clear();
  el.pondNextOverlay.hidden=true;transitioning=false;
  applyFont();applyTheme(1);updateBadge();closeSetting();newPond();
}

function wireEvents(){
  el.readBtn.addEventListener("click",speakSentence);
  el.doneBtn.addEventListener("click",()=>{if(!transitioning)nextStep();});
  el.prevBtn.addEventListener("click",()=>goTo(state.index-1));
  el.settingsBtn.addEventListener("click",openSetting);
  el.closeSettings.addEventListener("click",closeSetting);
  el.closeSettingsTop.addEventListener("click",closeSetting);
  el.btnLetsHop.addEventListener("click",()=>{el.pondNextOverlay.hidden=true;transitioning=false;newPond();});
  el.resetProgress.addEventListener("click",()=>{if(!resetArmed){armReset();return;}doReset();});
  el.roundOptions.querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{state.roundLength=parseInt(b.getAttribute("data-n"),10);closeSetting();newPond();}));
  el.fontOptions.querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{state.readFont=b.getAttribute("data-font");applyFont();closeSetting();}));
  el.speedOptions.querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{state.speechRate=parseFloat(b.getAttribute("data-speed"));}));
  el.voiceSelect.addEventListener("change",()=>{state.voiceName=el.voiceSelect.value;});
}

function init(){
  cacheEls();
  sOk="speechSynthesis" in window;
  if(!sOk)el.readBtn.disabled=true;
  else{window.speechSynthesis.onvoiceschanged=populateVoices;populateVoices();}
  applyFont();applyTheme(1);updateBadge();wireEvents();newPond();
}
document.addEventListener("DOMContentLoaded",init);
})();
</script>
</body>
</html>
